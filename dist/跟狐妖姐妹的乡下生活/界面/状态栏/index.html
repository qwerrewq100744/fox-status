}.chara-emoji{font-size:13px;flex-shrink:0}.stats{display:flex;gap:8px;margin-left:auto;font-size:12px;align-items:center}.affection{display:flex;align-items:center;gap:2px;color:var(--c-text-muted);font-weight:500}.trust{display:flex;align-items:center;gap:2px;color:var(--c-text-muted);font-weight:500;font-size:11px}.heart{color:var(--c-text-light);transition:color 0.5s ease;font-size:11px}.heart.active{color:var(--c-heart);animation:heartbeat 1.2s ease-in-out infinite}.shield{font-size:10px;opacity:0.4;transition:opacity 0.5s ease}.shield.active{opacity:1}.affection-bar,.trust-bar{height:3px;border-radius:3px;background:rgba(0,0,0,0.06);overflow:hidden;margin-bottom:2px}.trust-bar{height:2px}.bar-fill{height:100%;border-radius:3px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}.shiro-fill{background:linear-gradient(90deg,#bcccb8,#8bab8b)}.kitsune-fill{background:linear-gradient(90deg,#f5c882,#e8943a)}.trust-fill{background:linear-gradient(90deg,#a3bf9a,#5d8a5d)}.inner-thought{font-size:11px;color:var(--c-text-muted);line-height:1.5;margin-top:5px;padding-top:5px;border-top:1px dotted rgba(0,0,0,0.05);font-style:italic}.thought-mark{color:var(--c-text-light);font-size:10px}.status-bar.morning{--bg-gradient-top:rgba(232,180,100,0.18);--bg-gradient-bottom:rgba(180,210,150,0.06)}.status-bar.afternoon{--bg-gradient-top:rgba(220,160,80,0.12);--bg-gradient-bottom:rgba(160,200,130,0.10)}.status-bar.dusk{--bg-gradient-top:rgba(230,130,50,0.22);--bg-gradient-bottom:rgba(140,120,160,0.12)}.status-bar.night{--bg-gradient-top:rgba(50,60,100,0.25);--bg-gradient-bottom:rgba(30,40,70,0.15);border-color:#3a4560}.status-bar.night .card.shiro{background:linear-gradient(135deg,rgba(60,70,95,0.5),rgba(50,60,85,0.5));border-color:#3a4565}.status-bar.night .card.kitsune{background:linear-gradient(135deg,rgba(70,65,80,0.5),rgba(55,55,75,0.5));border-color:#4a4565}.status-bar.night .chara-name,.status-bar.night .time-info,.status-bar.night .inner-thought,.status-bar.night .affection,.sta
